name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: TTS_Live_UI/TTS_Live_UI.csproj
  APP_NAME: TTS_Live_UI

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: x64
            rid: win-x64
          - platform: x86
            rid: win-x86
          - platform: arm64
            rid: win-arm64

    runs-on: windows-latest
    name: Build ${{ matrix.rid }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }} -r ${{ matrix.rid }}

      - name: Publish (Standalone EXE)
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained true `
            -p:Platform=${{ matrix.platform }} `
            -p:WindowsPackageType=None `
            -p:AppxPackageSigningEnabled=false `
            -p:PublishTrimmed=false `
            -o ./publish/${{ matrix.rid }}

      - name: Create ZIP archive
        run: |
          Compress-Archive `
            -Path ./publish/${{ matrix.rid }}/* `
            -DestinationPath ./${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.rid }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.rid }}
          path: ./${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.rid }}.zip
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create GitHub Release

    steps:
      - name: Checkout (for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          
          # Try to get previous tag for changelog
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "$TAG" | head -n1 || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline "$PREV_TAG".."$TAG" --no-merges 2>/dev/null || echo "First release")
          else
            COMMITS="First release 🎉"
          fi
          
          cat > release_notes.md << 'NOTES_END'
          ## Text To Speech Live UI ${{ github.ref_name }}
          
          ### 📦 Downloads
          
          | Arquivo | Arquitetura | Descrição |
          |---|---|---|
          | `TTS_Live_UI-${{ github.ref_name }}-win-x64.zip` | Windows x64 | Recomendado para a maioria dos PCs |
          | `TTS_Live_UI-${{ github.ref_name }}-win-x86.zip` | Windows x86 | Para sistemas 32-bit |
          | `TTS_Live_UI-${{ github.ref_name }}-win-arm64.zip` | Windows ARM64 | Para dispositivos ARM (Surface Pro X, etc.) |
          
          ### 🚀 Como usar
          1. Baixe o ZIP para sua arquitetura
          2. Extraia em uma pasta
          3. Execute `TTS_Live_UI.exe`
          
          > **Requisito**: Windows 10 versão 1809 (build 17763) ou superior
          
          ### 📝 Mudanças
          NOTES_END
          
          echo "$COMMITS" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TTS Live UI ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            ./artifacts/*.zip
          generate_release_notes: true
